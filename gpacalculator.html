<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPA Portal | Pratik Timsina</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a56db;
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #d1d5db;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 10px; 
            background-color: var(--bg-body); 
            color: var(--text-main);
        }

        .container { max-width: 500px; margin: 0 auto; }
        
        .name-input-group {
            margin-bottom: 15px; background: white; padding: 15px;
            border-radius: 12px; border: 1px solid var(--border);
        }
        .name-input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
        .name-input-group input { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); 
            font-size: 16px; box-sizing: border-box; font-family: inherit;
        }

        .gpa-card {
            background: var(--bg-card); padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center;
            margin-bottom: 15px; border: 1px solid var(--border);
            position: sticky; top: 10px; z-index: 100;
        }
        #gpa-display { font-size: 3.2rem; font-weight: 800; color: var(--primary); line-height: 1; }
        
        .table-wrapper {
            background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border);
            overflow: hidden; margin-bottom: 15px;
        }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f9fafb; padding: 10px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #f3f4f6; font-size: 12px; }
        
        .col-sub { width: 62%; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .col-cr { width: 16%; text-align: center; color: var(--text-muted); }
        .col-gr { width: 22%; }

        select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border); font-size: 12px; background: #fff; }

        .actions { display: flex; flex-direction: column; gap: 8px; margin: 20px 0; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #111827; color: white; }

        #marksheet-container { display: none; background: white; padding: 25px 15px; border: 1px solid #000; margin-top: 20px; position: relative; }

        @media print {
            .name-input-group, .gpa-card, .table-wrapper, .actions, header { display: none !important; }
            #marksheet-container { display: block !important; border: none; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 15px;">
        <h1 style="color:var(--primary); margin:0;">GPA Predictor</h1>
        <p style="font-size:12px; color:var(--text-muted);">National Examinations Board Structure</p>
    </header>

    <div class="name-input-group">
        <label>Student Full Name</label>
        <input type="text" id="student-name" placeholder="Enter name to preview..." oninput="updateMSName()">
    </div>

    <div class="gpa-card">
        <div style="font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Predicted GPA</div>
        <div id="gpa-display">0.00</div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="col-sub">Subject</th>
                    <th class="col-cr">Cr</th>
                    <th class="col-gr">Grade</th>
                </tr>
            </thead>
            <tbody id="input-table"></tbody>
        </table>
    </div>

    <div class="actions">
        <button class="btn btn-primary" onclick="handlePreview()">Preview Marksheet</button>
        <button class="btn btn-secondary" onclick="window.print()">Download PDF</button>
    </div>

    <div id="marksheet-container">
        <div style="text-align: center; border-bottom: 2px solid #000; margin-bottom: 15px;">
            <h3 style="margin: 0; font-size: 14px;">NATIONAL EXAMINATIONS BOARD</h3>
            <p style="margin: 3px 0; font-size: 9px; font-weight: bold;">GRADE SHEET</p>
        </div>
        <div style="font-size: 11px; margin-bottom: 10px;">
            <strong>NAME:</strong> <span id="ms-display-name">_________________</span>
        </div>
        <table style="width:100%; border:1px solid #000; border-collapse:collapse; font-size:9px;">
            <thead>
                <tr style="background:#f0f0f0;">
                    <th style="border:1px solid #000; padding:4px;">Subjects</th>
                    <th style="border:1px solid #000; padding:4px; text-align:center;">Cr. Hr</th>
                    <th style="border:1px solid #000; padding:4px; text-align:center;">Grade</th>
                </tr>
            </thead>
            <tbody id="ms-body"></tbody>
            <tfoot>
                <tr style="font-weight: bold;">
                    <td colspan="2" style="border:1px solid #000; text-align: right; padding:4px;">GPA:</td>
                    <td id="ms-final-gpa" style="border:1px solid #000; text-align: center; padding:4px;"></td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>

<script>
const subjects = [
    {name: "COM.ENGLISH (TH)", credit: 3.00}, {name: "COM.ENGLISH (IN)", credit: 1.00},
    {name: "SOCIAL STUDIES (TH)", credit: 2.25}, {name: "SOCIAL STUDIES (PR)", credit: 0.75},
    {name: "CHEMISTRY (TH)", credit: 2.25}, {name: "CHEMISTRY (PR)", credit: 0.75},
    {name: "PHYSICS (TH)", credit: 2.25}, {name: "PHYSICS (PR)", credit: 0.75},
    {name: "MATHEMATICS (TH)", credit: 2.25}, {name: "MATHEMATICS (IN)", credit: 0.75},
    {name: "VISUAL PROG. (TH)", credit: 2.00}, {name: "VISUAL PROG. (PR)", credit: 2.00},
    {name: "COMP. NETWORK (TH)", credit: 2.00}, {name: "COMP. NETWORK (PR)", credit: 2.00},
    {name: "CONTEMP. TECH (TH)", credit: 2.00}, {name: "CONTEMP. TECH (PR)", credit: 2.00},
    {name: "SOFT. ENG. (TH)", credit: 2.00}, {name: "SOFT. ENG. (PR)", credit: 2.00},
    {name: "OJT TRAINING", credit: 10.00, locked: "A+"}
];

const gradePoints = {"A+": 4.0, "A": 3.6, "B+": 3.2, "B": 2.8, "C+": 2.4, "C": 2.0, "D": 1.6, "F": 0.0};

function formatGPA(num) { return (Math.floor(num * 100) / 100).toFixed(2); }

function updateMSName() {
    document.getElementById('ms-display-name').textContent = document.getElementById('student-name').value || "_________________";
}

const inputBody = document.getElementById("input-table");
subjects.forEach((sub, i) => {
    const row = document.createElement("tr");
    row.innerHTML = `
        <td class="col-sub">${sub.name}</td>
        <td class="col-cr">${sub.credit.toFixed(2)}</td>
        <td class="col-gr">
            ${sub.locked ? `<b style="color:var(--primary)">A+</b>` : 
            `<select onchange="calculateGPA()" data-index="${i}">
                <option value="">-</option>
                ${Object.keys(gradePoints).map(g => `<option value="${g}">${g}</option>`).join('')}
            </select>`}
        </td>
    `;
    inputBody.appendChild(row);
});

function calculateGPA() {
    let weightedSum = 0, totalCredits = 0;
    document.querySelectorAll("select").forEach(select => {
        if(select.value) {
            weightedSum += gradePoints[select.value] * subjects[select.dataset.index].credit;
            totalCredits += subjects[select.dataset.index].credit;
        }
    });
    weightedSum += (4.0 * 10.0);
    totalCredits += 10.0;
    document.getElementById("gpa-display").textContent = totalCredits > 0 ? formatGPA(weightedSum / totalCredits) : "0.00";
}

// Fixed Silent Save Function
async function silentSave(data) {
    const scriptURL = 'https://script.google.com/macros/s/AKfycby4EtAXxLqNTYw4bbNINwzK0w_R4p2El4G8e3XII7pA5H-YBIM_E0d_UnqUM-wrTpErOw/exec'; 
    try {
        await fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data),
            headers: { 'Content-Type': 'application/json' }
        });
        console.log("Prediction saved to Google Sheet.");
    } catch (e) { 
        console.error("Save failed:", e); 
    }
}

function handlePreview() {
    const name = document.getElementById('student-name').value;
    if(!name) { alert("Please enter your name first!"); return; }

    const gpa = document.getElementById("gpa-display").textContent;
    const grades = [];
    document.querySelectorAll("select").forEach(s => {
        grades.push({ sub: subjects[s.dataset.index].name, gr: s.value });
    });

    // Triggers the auto-save
    silentSave({ name, gpa, grades, date: new Date().toLocaleString() });

    // Generate Visual Marksheet
    const msBody = document.getElementById("ms-body");
    msBody.innerHTML = "";
    subjects.forEach((sub, i) => {
        let grade = sub.locked ? "A+" : document.querySelector(`select[data-index="${i}"]`).value;
        if(grade) {
            msBody.innerHTML += `<tr><td style="border:1px solid #000; padding:4px;">${sub.name}</td><td style="border:1px solid #000; text-align:center;">${sub.credit.toFixed(2)}</td><td style="border:1px solid #000; text-align:center;">${grade}</td></tr>`;
        }
    });
    document.getElementById("ms-final-gpa").textContent = gpa;
    document.getElementById("marksheet-container").style.display = "block";
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

calculateGPA();
</script>
</body>
</html>
